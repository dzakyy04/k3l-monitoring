<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline · K3L Monitoring</title>
    <link rel="apple-touch-icon" href="/images/iconpln.png">
    <meta name="theme-color" content="#0284C7">
    <style>
        * { box-sizing: border-box; }
        :root {
            color-scheme: light dark;
            --brand: #0284C7;
            --brand-2: #06B6D4;
            --bg: #F1F5F9;
            --surface: #FFFFFF;
            --text: #0F172A;
            --muted: #64748B;
            --border: #E2E8F0;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0F172A;
                --surface: #1E293B;
                --text: #F1F5F9;
                --muted: #94A3B8;
                --border: rgba(255,255,255,0.08);
            }
        }
        body {
            margin: 0;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 1.25rem;
            padding: 2rem 1.5rem;
            max-width: 24rem;
            width: 100%;
            text-align: center;
            box-shadow: 0 6px 18px rgba(15,23,42,0.06);
        }
        .icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 1.25rem;
            border-radius: 1rem;
            background: linear-gradient(135deg, var(--brand) 0%, var(--brand-2) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        h1 {
            font-size: 1.25rem;
            font-weight: 800;
            letter-spacing: -0.01em;
            margin: 0 0 0.5rem;
        }
        p {
            color: var(--muted);
            font-size: 0.875rem;
            line-height: 1.5;
            margin: 0 0 1.5rem;
        }
        button {
            background: var(--brand);
            color: white;
            border: 0;
            border-radius: 9999px;
            padding: 0.625rem 1.25rem;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 150ms ease;
            font-family: inherit;
        }
        button:hover { background: #0369A1; }
        button:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="2" x2="22" y1="2" y2="22"/>
                <path d="M8.5 16.43A5 5 0 0 1 12 15h.5"/>
                <path d="M5 13a10 10 0 0 1 5.24-2.76"/>
                <path d="M2 8.82a15 15 0 0 1 4.17-2.65"/>
                <path d="M10.66 5c4.01-.36 8.14.9 11.34 3.76"/>
                <path d="M16.85 11.25a10 10 0 0 1 2.22 1.68"/>
                <path d="M12 20h.01"/>
            </svg>
        </div>
        <h1>Anda sedang offline</h1>
        <p>Koneksi internet terputus. Beberapa fitur K3L Monitoring memerlukan koneksi aktif untuk berjalan.</p>
        <button onclick="location.reload()">Coba lagi</button>
    </div>
    <script>
        // Auto reload when connection back
        window.addEventListener('online', () => location.reload());
    </script>
</body>
</html>
